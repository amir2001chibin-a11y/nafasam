{

<style>
/* =====================================================================
   GLOBAL RESET
   ===================================================================== */
* { margin:0; padding:0; box-sizing:border-box; -webkit-tap-highlight-color:transparent; }
html, body {
  width:100%; height:100%; overflow:hidden;
  background:#04020a;
  font-family:'Vazirmatn', sans-serif;
  touch-action:none;
}

/* =====================================================================
   CANVAS LAYER
   ===================================================================== */
#bg-canvas {
  position:fixed; inset:0; width:100%; height:100%; display:block;
  background:
    radial-gradient(ellipse at 50% 30%, #1a0b2e 0%, #0c0518 35%, #050108 65%, #020003 100%);
}

/* =====================================================================
   START OVERLAY — glassmorphism luxury panel
   ===================================================================== */
#startOverlay {
  position:fixed; inset:0; z-index:50;
  display:flex; align-items:center; justify-content:center;
  background:
    radial-gradient(circle at 50% 40%, rgba(120,40,160,0.35), transparent 60%),
    rgba(3,1,8,0.92);
  transition:opacity 1.4s ease, visibility 1.4s ease;
}
#startOverlay.hidden { opacity:0; visibility:hidden; pointer-events:none; }

.glass-card {
  position:relative;
  width:min(420px, 86vw);
  padding:46px 34px 40px;
  text-align:center;
  border-radius:28px;
  background:linear-gradient(145deg, rgba(255,255,255,0.09), rgba(255,255,255,0.02));
  border:1px solid rgba(255,200,230,0.25);
  backdrop-filter:blur(22px) saturate(160%);
  -webkit-backdrop-filter:blur(22px) saturate(160%);
  box-shadow:0 0 60px rgba(180,80,220,0.25), 0 0 140px rgba(80,40,160,0.18), inset 0 0 40px rgba(255,255,255,0.04);
  animation:cardFloat 6s ease-in-out infinite;
}
@keyframes cardFloat { 0%,100%{transform:translateY(0)} 50%{transform:translateY(-8px)} }

.overlay-heart {
  font-size:42px; line-height:1;
  filter:drop-shadow(0 0 18px rgba(255,90,160,0.9)) drop-shadow(0 0 36px rgba(180,60,220,0.6));
  animation:heartPulseUI 1.7s ease-in-out infinite;
  margin-bottom:10px;
}
@keyframes heartPulseUI { 0%,100%{transform:scale(1)} 25%{transform:scale(1.18)} 40%{transform:scale(0.96)} 60%{transform:scale(1.1)} }

.glass-card h1 {
  font-weight:700; font-size:26px; letter-spacing:0.5px;
  color:#fbe9ff;
  text-shadow:0 0 18px rgba(255,140,210,0.55), 0 0 40px rgba(150,80,220,0.35);
  margin-bottom:10px;
}
.glass-card p {
  font-weight:300; font-size:14.5px; color:rgba(238,225,255,0.72);
  letter-spacing:0.3px; margin-bottom:30px; line-height:1.9;
}

#startBtn {
  position:relative;
  font-family:'Vazirmatn', sans-serif;
  font-size:16px; font-weight:600; letter-spacing:0.5px;
  color:#fff7fb;
  padding:15px 38px;
  border-radius:50px;
  border:1px solid rgba(255,210,235,0.5);
  background:linear-gradient(120deg, #d63aa9, #8b3df0 50%, #3aa7e0);
  cursor:pointer;
  overflow:hidden;
  box-shadow:0 0 24px rgba(214,58,169,0.55), 0 0 60px rgba(139,61,240,0.4);
  animation:btnGlow 2.6s ease-in-out infinite;
  transition:transform 0.35s ease, box-shadow 0.35s ease;
}
#startBtn:hover { transform:scale(1.06); box-shadow:0 0 36px rgba(214,58,169,0.85), 0 0 90px rgba(139,61,240,0.6); }
#startBtn:active { transform:scale(0.97); }
@keyframes btnGlow {
  0%,100% { box-shadow:0 0 24px rgba(214,58,169,0.55), 0 0 60px rgba(139,61,240,0.4); }
  50% { box-shadow:0 0 38px rgba(214,58,169,0.85), 0 0 90px rgba(139,61,240,0.65); }
}
#startBtn .shine {
  position:absolute; top:0; left:-60%; width:40%; height:100%;
  background:linear-gradient(120deg, transparent, rgba(255,255,255,0.55), transparent);
  transform:skewX(-20deg);
  animation:shineMove 3.2s ease-in-out infinite;
}
@keyframes shineMove { 0%{left:-60%} 50%{left:120%} 100%{left:120%} }

.hint { margin-top:18px; font-size:11.5px; color:rgba(255,255,255,0.35); letter-spacing:0.4px; }

/* =====================================================================
   TITLE — hollow Persian text with particles glowing inside via SVG clip
   ===================================================================== */
#titleWrap {
  position:fixed;
  top:6%; left:50%; transform:translateX(-50%);
  width:min(92vw, 720px); height:140px;
  z-index:10; pointer-events:none;
  opacity:0; transition:opacity 2s ease;
}
#titleWrap.show { opacity:1; }
#titleSvg { width:100%; height:100%; overflow:visible; }
.title-outline {
  font-family:'Vazirmatn', sans-serif;
  font-weight:900;
  fill:none;
  stroke:rgba(255,180,225,0.85);
  stroke-width:1.1px;
  paint-order:stroke;
  filter:drop-shadow(0 0 6px rgba(255,120,200,0.65)) drop-shadow(0 0 18px rgba(180,70,230,0.45));
}
.spark { mix-blend-mode:screen; }

/* =====================================================================
   COMET MESSAGE OVERLAY
   ===================================================================== */
#cometLayer { position:fixed; inset:0; z-index:8; pointer-events:none; overflow:hidden; }
.comet-msg {
  position:absolute;
  transform:translate(-50%,-50%) scale(0.5);
  text-align:center;
  font-family:'Vazirmatn', sans-serif;
  font-weight:500;
  font-size:clamp(15px, 2.6vw, 25px);
  color:#fff6fb;
  white-space:normal;
  max-width:min(78vw, 480px);
  width:max-content;
  opacity:0;
  filter:blur(10px);
  letter-spacing:0.3px;
  line-height:1.6;
  padding:18px 30px;
  border-radius:26px;
  /* frosted glass panel so the galaxy's particle glow doesn't bleed through the text */
  background:linear-gradient(160deg, rgba(40,18,60,0.55), rgba(15,8,28,0.42));
  -webkit-backdrop-filter:blur(22px) saturate(140%);
  backdrop-filter:blur(22px) saturate(140%);
  border:1px solid rgba(255,200,235,0.22);
  box-shadow:0 0 30px rgba(150,60,220,0.25), inset 0 0 24px rgba(255,255,255,0.04);
  text-shadow:
    0 0 10px rgba(255,140,210,0.9),
    0 0 22px rgba(220,90,255,0.65);
  transition:opacity 1.1s ease, transform 1.1s cubic-bezier(.2,.9,.25,1), filter 1.1s ease;
}
.comet-msg.burst::before {
  content:"";
  position:absolute; left:50%; top:50%;
  width:14px; height:14px; transform:translate(-50%,-50%);
  border-radius:50%;
  background:radial-gradient(circle, rgba(255,210,240,0.95), rgba(190,90,255,0.5) 45%, transparent 75%);
  animation:burstExpand 1.1s ease-out forwards;
}
@keyframes burstExpand {
  0% { width:6px; height:6px; opacity:1; }
  100% { width:340px; height:200px; opacity:0; }
}
.comet-msg.assembled { opacity:1; transform:translate(-50%,-50%) scale(1); filter:blur(0px); }
.comet-msg.dissolving { opacity:0; transform:translate(-50%,-50%) scale(1.25); filter:blur(14px); }

/* =====================================================================
   FOOTER HINT / UI CHROME
   ===================================================================== */
#dragHint {
  position:fixed; bottom:22px; left:50%; transform:translateX(-50%);
  z-index:9; color:rgba(255,255,255,0.4); font-size:12px; letter-spacing:0.4px;
  opacity:0; transition:opacity 1.5s ease 2.4s;
  pointer-events:none;
}
#dragHint.show { opacity:1; }

/* Respect users who prefer reduced motion: tone down decorative CSS animation */
@media (prefers-reduced-motion: reduce) {
  .overlay-heart, #startBtn, .glass-card { animation:none !important; }
}
</style>
</head>

<body>

<!-- ===================== BACKGROUND MUSIC ===================== -->
<audio id="bgMusic" loop preload="auto">
  <source src="music.mp3" type="audio/mpeg" />
  <!-- Replace music.mp3 with your own track. -->
</audio>

<!-- ===================== THREE.JS CANVAS ===================== -->
<canvas id="bg-canvas"></canvas>

<!-- ===================== TITLE (hollow text + inner particles) ===================== -->
<div id="titleWrap">
  <svg id="titleSvg" viewBox="0 0 720 140" preserveAspectRatio="xMidYMid meet">
    <defs>
      <clipPath id="titleClip">
        <text x="360" y="92" text-anchor="middle" font-family="Vazirmatn" font-weight="900" font-size="64">دوست دارم ❤️</text>
      </clipPath>
      <filter id="sparkBlur" x="-50%" y="-50%" width="200%" height="200%">
        <feGaussianBlur stdDeviation="2.1" />
      </filter>

    <!-- hollow outlined letters -->
    <text class="title-outline" x="360" y="92" text-anchor="middle" font-size="64">دوست دارم ❤️</text>

<!-- ===================== COMET MESSAGE LAYER ===================== -->

<div id="dragHint">برای چرخش، بکش — برای زوم، بزرگنمایی کن ✦</div>

<!-- ===================== START OVERLAY ===================== -->
<div id="startOverlay">
  <div class="glass-card">
    <div class="overlay-heart">❤</div>
    <h1>برای زری</h1>
    <p>یک دنیای کوچک، ساخته‌شده از ستاره‌ها و عشق —<br/>فقط برای تو.</p>
    <button id="startBtn"><span class="shine"></span>ورود به کهکشان عشق</button>

  </div>
</div>

<!-- =====================================================================
     MAIN APPLICATION MODULE
     ===================================================================== -->
<script type="module">
import * as THREE from 'three';
import { OrbitControls } from 'three/addons/controls/OrbitControls.js';
import { EffectComposer } from 'three/addons/postprocessing/EffectComposer.js';
import { RenderPass } from 'three/addons/postprocessing/RenderPass.js';
import { UnrealBloomPass } from 'three/addons/postprocessing/UnrealBloomPass.js';

/* =====================================================================
   0. DEVICE / QUALITY DETECTION
   ===================================================================== */
const isMobile = window.innerWidth < 820 || /Mobi|Android/i.test(navigator.userAgent);
const QUALITY = isMobile ? 0.5 : 1.0;
const PIXEL_RATIO = Math.min(window.devicePixelRatio || 1, isMobile ? 2 : 2.2);

/* =====================================================================
   1. CORE THREE.JS SETUP
   ===================================================================== */
const canvas = document.getElementById('bg-canvas');
const scene = new THREE.Scene();

const camera = new THREE.PerspectiveCamera(55, window.innerWidth / window.innerHeight, 0.1, 600);
camera.position.set(0, 8, 34);

const renderer = new THREE.WebGLRenderer({ canvas, antialias:true, alpha:false });
renderer.setPixelRatio(PIXEL_RATIO);
renderer.setSize(window.innerWidth, window.innerHeight);
renderer.outputColorSpace = THREE.SRGBColorSpace;

const controls = new OrbitControls(camera, renderer.domElement);
controls.enableDamping = true;
controls.dampingFactor = 0.045;
controls.rotateSpeed = 0.55;
controls.minDistance = 10;
controls.maxDistance = 95;
controls.enablePan = false;
controls.autoRotate = true;
controls.autoRotateSpeed = 0.28;

/* ---- Post-processing: Unreal Bloom for that cinematic glow ---- */
const composer = new EffectComposer(renderer);
composer.addPass(new RenderPass(scene, camera));
const bloomPass = new UnrealBloomPass(
  new THREE.Vector2(window.innerWidth, window.innerHeight),
  isMobile ? 0.95 : 1.25,   // strength
  0.85,                      // radius
  0.18                       // threshold
);
composer.addPass(bloomPass);

window.addEventListener('resize', () => {
  camera.aspect = window.innerWidth / window.innerHeight;
  camera.updateProjectionMatrix();
  renderer.setSize(window.innerWidth, window.innerHeight);
  composer.setSize(window.innerWidth, window.innerHeight);
}, { passive:true });

/* =====================================================================
   2. SHARED "SOFT GLOW" PARTICLE MATERIAL (no textures, pure shader)
   ===================================================================== */
function createGlowMaterial(sizeMultiplier = 1.0) {
  return new THREE.ShaderMaterial({
    transparent:true,
    depthWrite:false,
    blending:THREE.AdditiveBlending,
    uniforms:{
      uTime:{ value:0 },
      uPixelRatio:{ value:PIXEL_RATIO },
      uSizeMul:{ value:sizeMultiplier }
    },
    vertexShader:`
      attribute float size;
      attribute float phase;
      attribute float speed;
      attribute vec3 color;
      uniform float uTime;
      uniform float uPixelRatio;
      uniform float uSizeMul;
      varying vec3 vColor;
      varying float vAlpha;
      void main(){
        vec4 mvPosition = modelViewMatrix * vec4(position, 1.0);
        float twinkle = 0.6 + 0.4 * sin(uTime * speed + phase);
        gl_PointSize = size * uSizeMul * uPixelRatio * twinkle * (300.0 / -mvPosition.z);
        gl_Position = projectionMatrix * mvPosition;
        vColor = color;
        vAlpha = twinkle;
      }
    `,
    fragmentShader:`
      varying vec3 vColor;
      varying float vAlpha;
      void main(){
        float d = length(gl_PointCoord - vec2(0.5));
        float strength = smoothstep(0.5, 0.0, d);
        strength = pow(strength, 1.6);
        gl_FragColor = vec4(vColor * strength, strength * vAlpha);
      }
    `
  });
}

/* helper to build a Float32 attribute set for N particles */
function makeAttrs(n){
  return {
    positions:new Float32Array(n*3),
    colors:new Float32Array(n*3),
    sizes:new Float32Array(n),
    phases:new Float32Array(n),
    speeds:new Float32Array(n)
  };
}
function applyAttrs(geo, a){
  geo.setAttribute('position', new THREE.BufferAttribute(a.positions, 3));
  geo.setAttribute('color', new THREE.BufferAttribute(a.colors, 3));
  geo.setAttribute('size', new THREE.BufferAttribute(a.sizes, 1));
  geo.setAttribute('phase', new THREE.BufferAttribute(a.phases, 1));
  geo.setAttribute('speed', new THREE.BufferAttribute(a.speeds, 1));
}

const tmpColor = new THREE.Color();

/* =====================================================================
   3. STARFIELD — thousands of blinking, depth-varied stars
   ===================================================================== */
const STAR_COUNT = Math.floor(9000 * QUALITY);
const starsGroup = new THREE.Group();
{
  const a = makeAttrs(STAR_COUNT);
  for(let i=0;i<STAR_COUNT;i++){
    const r = 60 + Math.random()*220;
    const theta = Math.random()*Math.PI*2;
    const phi = Math.acos((Math.random()*2)-1);
    const x = r*Math.sin(phi)*Math.cos(theta);
    const y = r*Math.cos(phi);
    const z = r*Math.sin(phi)*Math.sin(theta);
    a.positions.set([x,y,z], i*3);

    const hue = Math.random();
    let c;
    if (hue < 0.7) c = tmpColor.setHSL(0.0, 0.0, 0.85 + Math.random()*0.15);      // white
    else if (hue < 0.85) c = tmpColor.setHSL(0.62, 0.6, 0.75);                    // blue-white
    else c = tmpColor.setHSL(0.08, 0.7, 0.75);                                    // warm gold
    a.colors.set([c.r,c.g,c.b], i*3);

    a.sizes[i] = (Math.random()*1.6 + 0.4) * (Math.random()<0.06 ? 2.6 : 1.0);
    a.phases[i] = Math.random()*Math.PI*2;
    a.speeds[i] = 0.3 + Math.random()*1.6;
  }
  const geo = new THREE.BufferGeometry();
  applyAttrs(geo, a);
  const mat = createGlowMaterial(1.0);
  const points = new THREE.Points(geo, mat);
  starsGroup.add(points);
  starsGroup.userData.material = mat;
  scene.add(starsGroup);
}

/* slow independent drift for a thin subset handled by rotating whole group very slowly */
starsGroup.userData.rotSpeed = 0.0025;

/* =====================================================================
   4. SHOOTING STARS — golden streaks flying across space forever
   ===================================================================== */
const SHOOTER_COUNT = 6;
const shooters = [];
{
  for(let i=0;i<SHOOTER_COUNT;i++){
    const TRAIL_LEN = 14;
    const a = makeAttrs(TRAIL_LEN);
    for(let j=0;j<TRAIL_LEN;j++){
      const t = j/(TRAIL_LEN-1);
      const c = tmpColor.setHSL(0.12, 0.9, 0.6 + 0.4*(1-t));
      a.colors.set([c.r,c.g,c.b], j*3);
      a.sizes[j] = (1.0 - t) * 3.2 + 0.2;
      a.phases[j] = Math.PI*0.5;
      a.speeds[j] = 0;
    }
    const geo = new THREE.BufferGeometry();
    applyAttrs(geo, a);
    const mat = createGlowMaterial(1.0);
    mat.uniforms.uTime.value = 0;
    const pts = new THREE.Points(geo, mat);
    scene.add(pts);
    shooters.push({
      pts, trailLen:TRAIL_LEN,
      trail:new Array(TRAIL_LEN).fill(null).map(()=>new THREE.Vector3()),
      vel:new THREE.Vector3(), life:0, maxLife:1, active:false,
      delay: Math.random()*6
    });
  }
}
function spawnShooter(s){
  const startSide = new THREE.Vector3(
    (Math.random()<0.5?-1:1) * (80+Math.random()*40),
    20 + Math.random()*60,
    -60 + Math.random()*120
  );
  s.vel = new THREE.Vector3(-startSide.x, -18 - Math.random()*14, (Math.random()-0.5)*20).normalize().multiplyScalar(90+Math.random()*40);
  for(let k=0;k<s.trailLen;k++) s.trail[k].copy(startSide);
  s.head = startSide.clone();
  s.life = 0;
  s.maxLife = 1.1 + Math.random()*0.6;
  s.active = true;
}
function updateShooters(dt){
  shooters.forEach(s=>{
    if(!s.active){
      s.delay -= dt;
      if(s.delay<=0) spawnShooter(s);
      return;
    }
    s.life += dt;
    s.head.addScaledVector(s.vel, dt);
    s.trail.pop();
    s.trail.unshift(s.head.clone());
    const posAttr = s.pts.geometry.attributes.position;
    for(let k=0;k<s.trailLen;k++){
      posAttr.array[k*3] = s.trail[k].x;
      posAttr.array[k*3+1] = s.trail[k].y;
      posAttr.array[k*3+2] = s.trail[k].z;
    }
    posAttr.needsUpdate = true;
    if(s.life > s.maxLife){
      s.active = false;
      s.delay = 2 + Math.random()*6;
    }
  });
}

/* =====================================================================
   5. TRAVELING GLOW-HEART PARTICLES (procedural heart sprite, no text)
   ===================================================================== */
function makeHeartTexture(){
  const c = document.createElement('canvas');
  c.width = c.height = 128;
  const ctx = c.getContext('2d');
  ctx.translate(64,70);
  ctx.scale(3.6,3.6);
  ctx.beginPath();
  ctx.moveTo(0,6);
  ctx.bezierCurveTo(-14,-12,-30,2,0,20);
  ctx.bezierCurveTo(30,2,14,-12,0,6);
  ctx.closePath();
  const grad = ctx.createRadialGradient(0,4,1,0,4,20);
  grad.addColorStop(0,'rgba(255,235,250,1)');
  grad.addColorStop(0.4,'rgba(255,120,195,0.95)');
  grad.addColorStop(1,'rgba(180,40,150,0)');
  ctx.fillStyle = grad;
  ctx.shadowColor = 'rgba(255,120,200,0.9)';
  ctx.shadowBlur = 14;
  ctx.fill();
  return new THREE.CanvasTexture(c);
}
const heartTex = makeHeartTexture();
const loveHearts = [];
const LOVEHEART_COUNT = Math.floor(16 * QUALITY);
const loveHeartsGroup = new THREE.Group();
for(let i=0;i<LOVEHEART_COUNT;i++){
  const mat = new THREE.SpriteMaterial({ map:heartTex, transparent:true, blending:THREE.AdditiveBlending, depthWrite:false, opacity:0.85 });
  const spr = new THREE.Sprite(mat);
  const scale = 0.6 + Math.random()*1.1;
  spr.scale.set(scale, scale, 1);
  const radius = 35 + Math.random()*70;
  const data = {
    spr, radius,
    theta:Math.random()*Math.PI*2,
    phi: Math.acos((Math.random()*2)-1),
    speed: (0.02 + Math.random()*0.04) * (Math.random()<0.5?1:-1),
    bobPhase: Math.random()*Math.PI*2
  };
  loveHearts.push(data);
  loveHeartsGroup.add(spr);
}
scene.add(loveHeartsGroup);
function updateLoveHearts(t){
  loveHearts.forEach(d=>{
    d.theta += d.speed*0.016;
    const r = d.radius + Math.sin(t*0.3+d.bobPhase)*3;
    d.spr.position.set(
      r*Math.sin(d.phi)*Math.cos(d.theta),
      r*Math.cos(d.phi) + Math.sin(t*0.5+d.bobPhase)*4,
      r*Math.sin(d.phi)*Math.sin(d.theta)
    );
    d.spr.material.opacity = 0.55 + Math.sin(t*1.4+d.bobPhase)*0.3;
  });
}

/* =====================================================================
   6. GALAXY — 20,000+ particle spiral, glowing & breathing
   ===================================================================== */
const GALAXY_COUNT = Math.floor(20000 * QUALITY);
const GALAXY_BRANCHES = 5;
const GALAXY_RADIUS = 42;
const GALAXY_SPIN = 1.35;
const GALAXY_RANDOMNESS = 0.42;
const GALAXY_RAND_POWER = 2.6;

const galaxyPalette = [
  new THREE.Color('#ff7ad9'), // pink
  new THREE.Color('#b06bff'), // purple
  new THREE.Color('#6ea8ff'), // blue
  new THREE.Color('#5cf0ff'), // cyan
  new THREE.Color('#ff5ce0'), // magenta
  new THREE.Color('#ffd27a'), // gold
];
const galaxyCenterColor = new THREE.Color('#fff7f0');

const galaxyGroup = new THREE.Group();
let galaxyMat;
{
  const a = makeAttrs(GALAXY_COUNT);
  for(let i=0;i<GALAXY_COUNT;i++){
    const radius = Math.pow(Math.random(), 0.7) * GALAXY_RADIUS;
    const branchAngle = ((i % GALAXY_BRANCHES) / GALAXY_BRANCHES) * Math.PI * 2;
    const spinAngle = radius * GALAXY_SPIN * 0.18;

    const randSign = ()=> (Math.random()<0.5 ? 1 : -1);
    const rx = Math.pow(Math.random(), GALAXY_RAND_POWER) * GALAXY_RANDOMNESS * randSign() * radius * 0.3;
    const ry = Math.pow(Math.random(), GALAXY_RAND_POWER) * GALAXY_RANDOMNESS * randSign() * radius * 0.12;
    const rz = Math.pow(Math.random(), GALAXY_RAND_POWER) * GALAXY_RANDOMNESS * randSign() * radius * 0.3;

    const angle = branchAngle + spinAngle;
    const x = Math.cos(angle) * radius + rx;
    const y = ry;
    const z = Math.sin(angle) * radius + rz;
    a.positions.set([x,y,z], i*3);

    const mixT = THREE.MathUtils.clamp(radius / GALAXY_RADIUS, 0, 1);
    const branchColor = galaxyPalette[i % galaxyPalette.length].clone();
    const c = galaxyCenterColor.clone().lerp(branchColor, Math.pow(mixT, 0.55));
    a.colors.set([c.r,c.g,c.b], i*3);

    a.sizes[i] = (Math.random()*1.1 + 0.35) * (1.15 - mixT*0.4);
    a.phases[i] = Math.random()*Math.PI*2;
    a.speeds[i] = 0.15 + Math.random()*0.35; // gentle breathing twinkle
  }
  const geo = new THREE.BufferGeometry();
  applyAttrs(geo, a);
  galaxyMat = createGlowMaterial(1.35);
  const points = new THREE.Points(geo, galaxyMat);
  galaxyGroup.add(points);
}
scene.add(galaxyGroup);

/* =====================================================================
   7. HEART (particle-only) + LETTER "Z" — nested at the galaxy's core,
      so both rotate together with the galaxy and pulse with the beat
   ===================================================================== */
const heartGroup = new THREE.Group();
galaxyGroup.add(heartGroup);

const HEART_COUNT = Math.floor(4200 * QUALITY);
let heartMat;
{
  const a = makeAttrs(HEART_COUNT);
  const heartScale = 0.46;
  for(let i=0;i<HEART_COUNT;i++){
    const t = Math.random()*Math.PI*2;
    let hx = 16*Math.pow(Math.sin(t),3);
    let hy = 13*Math.cos(t) - 5*Math.cos(2*t) - 2*Math.cos(3*t) - Math.cos(4*t);

    if (Math.random() < 0.34){
      // interior fill — pull toward an interior reference point for volume
      const fillT = Math.pow(Math.random(), 0.45);
      hx *= fillT;
      hy = (hy - 2.5) * fillT + 2.5;
    } else {
      // shell jitter for sparkle-edge look
      hx += (Math.random()-0.5)*1.1;
      hy += (Math.random()-0.5)*1.1;
    }

    const x = hx * heartScale;
    const y = hy * heartScale;
    const z = (Math.random()-0.5) * 1.6;
    a.positions.set([x,y,z], i*3);

    const c = (Math.random() < 0.5)
      ? new THREE.Color('#ff3fb0').lerp(new THREE.Color('#ffffff'), Math.random()*0.4)
      : new THREE.Color('#ff8fd6').lerp(new THREE.Color('#ffffff'), Math.random()*0.6);
    a.colors.set([c.r,c.g,c.b], i*3);

    a.sizes[i] = Math.random()*1.3 + 0.5;
    a.phases[i] = Math.random()*Math.PI*2;
    a.speeds[i] = 0.5 + Math.random()*1.0;
  }
  const geo = new THREE.BufferGeometry();
  applyAttrs(geo, a);
  heartMat = createGlowMaterial(1.5);
  const points = new THREE.Points(geo, heartMat);
  heartGroup.add(points);
}

/* ---- Letter "Z" made of particles, nested inside the heart ---- */
const Z_COUNT = Math.floor(2600 * QUALITY);
let zMat;
{
  const a = makeAttrs(Z_COUNT);
  // three strokes of a "Z" in local 2D space, sampled by arclength
  const segs = [
    { p1:[-4.4, 6.6], p2:[4.4, 6.6] },   // top bar
    { p1:[4.4, 6.6],  p2:[-4.4,-6.6] },  // diagonal
    { p1:[-4.4,-6.6], p2:[4.4,-6.6] }    // bottom bar
  ];
  const lens = segs.map(s => Math.hypot(s.p2[0]-s.p1[0], s.p2[1]-s.p1[1]));
  const totalLen = lens.reduce((a,b)=>a+b,0);
  const zScale = 0.46;

  for(let i=0;i<Z_COUNT;i++){
    let pick = Math.random()*totalLen;
    let segIndex = 0;
    while (pick > lens[segIndex] && segIndex < segs.length-1){ pick -= lens[segIndex]; segIndex++; }
    const s = segs[segIndex];
    const tt = lens[segIndex] === 0 ? 0 : pick/lens[segIndex];
    const px = s.p1[0] + (s.p2[0]-s.p1[0]) * tt;
    const py = s.p1[1] + (s.p2[1]-s.p1[1]) * tt;
    const jitter = 0.28;
    const x = (px + (Math.random()-0.5)*jitter) * zScale;
    const y = (py + (Math.random()-0.5)*jitter) * zScale;
    const z = (Math.random()-0.5) * 0.9 + 0.4;
    a.positions.set([x,y,z], i*3);

    const c = new THREE.Color('#fffaf2').lerp(new THREE.Color('#ffd9b0'), Math.random()*0.5);
    a.colors.set([c.r,c.g,c.b], i*3);

    a.sizes[i] = Math.random()*1.1 + 0.55;
    a.phases[i] = Math.random()*Math.PI*2;
    a.speeds[i] = 0.6 + Math.random()*1.2;
  }
  const geo = new THREE.BufferGeometry();
  applyAttrs(geo, a);
  zMat = createGlowMaterial(1.6);
  const points = new THREE.Points(geo, zMat);
  heartGroup.add(points);
}

/* Heartbeat: two quick pulses (lub-dub) per cycle, like a real heartbeat */
function heartBeatScale(t){
  const cycle = 1.15; // seconds per full heartbeat cycle
  const local = (t % cycle) / cycle;
  const pulse = (center, width, amp) => {
    const d = local - center;
    return amp * Math.exp(-(d*d) / (2*width*width));
  };
  return 1 + pulse(0.06, 0.045, 0.16) + pulse(0.22, 0.05, 0.09);
}

/* =====================================================================
   8. INTRO BURST — everything bursts outward from a single point
   ===================================================================== */
const burstGroups = [
  { group:starsGroup,      delay:0,    duration:2200 },
  { group:galaxyGroup,     delay:160,  duration:2600 },
  { group:loveHeartsGroup, delay:500,  duration:2000 },
];
function easeOutBack(x){
  const c1 = 1.7, c3 = c1+1;
  return 1 + c3*Math.pow(x-1,3) + c1*Math.pow(x-1,2);
}
function primeBurstGroups(){
  burstGroups.forEach(b=>{ b.group.scale.setScalar(0.0001); b.group.userData.started=false; });
  heartGroup.scale.setScalar(0.0001);
}
let appStartTime = null;
function triggerIntroBurst(){
  appStartTime = performance.now();
  burstGroups.forEach(b=>{ b.group.userData.startAt = appStartTime + b.delay; b.group.userData.started=false; });
  heartGroup.userData.startAt = appStartTime + 650;
  heartGroup.userData.duration = 2200;
  heartGroup.userData.started = false;
}
function updateBurst(now){
  [...burstGroups, { group:heartGroup, delay:0, duration:heartGroup.userData.duration||2200 }].forEach(b=>{
    const g = b.group;
    if(g.userData.startAt === undefined) return;
    const t = (now - g.userData.startAt) / (g.userData.duration || b.duration);
    if (t < 0) return;
    const clamped = Math.min(t, 1);
    const eased = easeOutBack(clamped);
    g.scale.setScalar(Math.max(eased, 0.0001));
    if (clamped >= 1) g.userData.startAt = undefined;
  });
}

/* =====================================================================
   9. COMET MESSAGE SYSTEM — flies, leaves trail, becomes text, dissolves
   ===================================================================== */
const messages = [
  "منیم بالام، امیر سنه قوربان ❤️",
  "منیم سوگیلیم دونیامسان 🫀💖",
  "🌹 فدای تو بشم زری خانوم 🫂",
  "🥰 منیم عشقیم کیمدییی؟ 💕",
  "گوگولی بالام کیمدییی؟ 🤗💋",
  "🤍 بغلت تنها جاییه که میتونم آروم بشم 🫂",
  "🌎 دنیای منی ✨",
  "🌬️ نفس من ❤️",
  "نور زندگیم 💛"
];
let msgIndex = 0;

const cometTrailLen = 26;
const cometAttrs = makeAttrs(cometTrailLen);
for(let i=0;i<cometTrailLen;i++){
  const t = i/(cometTrailLen-1);
  const c = tmpColor.setHSL(0.85, 0.85, 0.55 + 0.4*(1-t));
  cometAttrs.colors.set([c.r,c.g,c.b], i*3);
  cometAttrs.sizes[i] = (1-t)*2.6 + 0.15;
  cometAttrs.phases[i] = Math.PI*0.5;
  cometAttrs.speeds[i] = 0;
}
const cometGeo = new THREE.BufferGeometry();
applyAttrs(cometGeo, cometAttrs);
const cometMat = createGlowMaterial(1.3);
const cometPoints = new THREE.Points(cometGeo, cometMat);
cometPoints.visible = false;
scene.add(cometPoints);

const cometTrail = new Array(cometTrailLen).fill(null).map(()=>new THREE.Vector3());
let cometCurve = null;
let cometState = 'idle'; // idle -> flying -> bursting -> showing -> dissolving
let cometStateTime = 0;
const cometLayer = document.getElementById('cometLayer');
let activeMsgEl = null;

function randomCometCurve(){
  const pts = [];
  const n = 5;
  for(let i=0;i<n;i++){
    const r = 18 + Math.random()*30;
    const theta = Math.random()*Math.PI*2;
    const phi = Math.acos((Math.random()*2)-1);
    pts.push(new THREE.Vector3(
      r*Math.sin(phi)*Math.cos(theta),
      r*Math.cos(phi)*0.7,
      r*Math.sin(phi)*Math.sin(theta)
    ));
  }
  return new THREE.CatmullRomCurve3(pts, false, 'catmullrom', 0.4);
}
function startComet(){
  cometCurve = randomCometCurve();
  cometPoints.visible = true;
  const startPos = cometCurve.getPointAt(0);
  cometTrail.forEach(v=>v.copy(startPos));
  cometState = 'flying';
  cometStateTime = 0;
}
function projectToScreen(vec3){
  const v = vec3.clone().project(camera);
  return {
    x:(v.x*0.5+0.5)*window.innerWidth,
    y:(1-(v.y*0.5+0.5))*window.innerHeight
  };
}
function showCometMessage(){
  const el = document.createElement('div');
  el.className = 'comet-msg burst';
  el.textContent = messages[msgIndex % messages.length];
  msgIndex++;
  // random spot within the galaxy's on-screen area (centered region, away from title/hint)
  const x = window.innerWidth  * (0.18 + Math.random()*0.64);
  const y = window.innerHeight * (0.24 + Math.random()*0.44);
  el.style.left = x+'px';
  el.style.top = y+'px';
  cometLayer.appendChild(el);
  activeMsgEl = el;
  requestAnimationFrame(()=> requestAnimationFrame(()=> el.classList.add('assembled')));
}
function dissolveCometMessage(){
  if(!activeMsgEl) return;
  activeMsgEl.classList.remove('assembled');
  activeMsgEl.classList.add('dissolving');
  const el = activeMsgEl;
  setTimeout(()=>{ if(el && el.parentNode) el.parentNode.removeChild(el); }, 1300);
  activeMsgEl = null;
}
function updateComet(dt, now){
  if (cometState === 'idle'){
    cometState = '_pendingStart';
    cometStateTime = 1.2;
    return;
  }
  if (cometState === '_pendingStart'){
    cometStateTime -= dt;
    if (cometStateTime <= 0) startComet();
    return;
  }
  cometStateTime += dt;

  if (cometState === 'flying'){
    const duration = 4.2;
    const t = Math.min(cometStateTime/duration, 1);
    const eased = t<0.5 ? 2*t*t : 1-Math.pow(-2*t+2,2)/2;
    const head = cometCurve.getPointAt(eased);
    cometTrail.pop();
    cometTrail.unshift(head.clone());
    const posAttr = cometPoints.geometry.attributes.position;
    for(let k=0;k<cometTrailLen;k++){
      posAttr.array[k*3] = cometTrail[k].x;
      posAttr.array[k*3+1] = cometTrail[k].y;
      posAttr.array[k*3+2] = cometTrail[k].z;
    }
    posAttr.needsUpdate = true;
    if (t>=1){
      cometState = 'bursting';
      cometStateTime = 0;
      cometPoints.userData.stopPos = head.clone();
    }
  } else if (cometState === 'bursting'){
    if (cometStateTime > 0.5){
      showCometMessage();
      cometPoints.visible = false;
      cometState = 'showing';
      cometStateTime = 0;
    }
  } else if (cometState === 'showing'){
    if (cometStateTime > 4.2){
      dissolveCometMessage();
      cometState = 'dissolving';
      cometStateTime = 0;
    }
  } else if (cometState === 'dissolving'){
    if (cometStateTime > 1.5){
      cometState = '_pendingStart';
      cometStateTime = 1.4 + Math.random()*1.4;
    }
  }
}

/* =====================================================================
   10. TITLE SPARKLE FIREWORKS — particles confined inside hollow letters
   ===================================================================== */
const sparkGroup = document.getElementById('sparkGroup');
const SPARK_COUNT = 70;
const sparks = [];
const sparkColors = ['#ff5fc0','#ff3d6e','#b768ff','#ff9ad6','#ffffff'];
for(let i=0;i<SPARK_COUNT;i++){
  const c = document.createElementNS('http://www.w3.org/2000/svg','circle');
  const r = 1.4 + Math.random()*2.2;
  c.setAttribute('r', r.toFixed(2));
  c.setAttribute('class','spark');
  c.setAttribute('fill', sparkColors[i % sparkColors.length]);
  sparkGroup.appendChild(c);
  sparks.push({
    el:c,
    x: 80 + Math.random()*560,
    y: 30 + Math.random()*90,
    vx:(Math.random()-0.5)*30,
    vy:(Math.random()-0.5)*30,
    life: Math.random()*2,
    maxLife: 1.4 + Math.random()*1.6
  });
}
function updateSparks(dt){
  sparks.forEach(s=>{
    s.life += dt;
    if (s.life > s.maxLife){
      s.life = 0;
      s.x = 80 + Math.random()*560;
      s.y = 30 + Math.random()*90;
      s.vx = (Math.random()-0.5)*40;
      s.vy = (Math.random()-0.5)*40;
    }
    s.x += s.vx*dt;
    s.y += s.vy*dt;
    const fade = Math.sin((s.life/s.maxLife)*Math.PI);
    s.el.setAttribute('cx', s.x.toFixed(1));
    s.el.setAttribute('cy', s.y.toFixed(1));
    s.el.setAttribute('opacity', fade.toFixed(2));
  });
}

/* =====================================================================
   11. START SEQUENCE — overlay fade, audio start, intro burst
   ===================================================================== */
const startOverlay = document.getElementById('startOverlay');
const startBtn = document.getElementById('startBtn');
const bgMusic = document.getElementById('bgMusic');
const titleWrap = document.getElementById('titleWrap');
const dragHint = document.getElementById('dragHint');

primeBurstGroups();

let experienceStarted = false;
startBtn.addEventListener('click', () => {
  if (experienceStarted) return;
  experienceStarted = true;

  startOverlay.classList.add('hidden');

  try {
    bgMusic.volume = 0.55;
    const p = bgMusic.play();
    if (p && p.catch) p.catch(()=>{ /* autoplay blocked — ignored gracefully */ });
  } catch(e) { /* ignore audio errors so the visual experience still runs */ }

  triggerIntroBurst();
  setTimeout(()=> titleWrap.classList.add('show'), 900);
  setTimeout(()=> dragHint.classList.add('show'), 1600);
  setTimeout(()=> dragHint.classList.remove('show'), 7000);
}, { passive:true });

/* =====================================================================
   12. MAIN RENDER LOOP
   ===================================================================== */
const clock = new THREE.Clock();

function animate(){
  requestAnimationFrame(animate);
  const dt = Math.min(clock.getDelta(), 0.05);
  const t = clock.elapsedTime;
  const now = performance.now();

  // twinkle / breathing uniforms
  starsGroup.userData.material.uniforms.uTime.value = t;
  galaxyMat.uniforms.uTime.value = t;
  heartMat.uniforms.uTime.value = t;
  zMat.uniforms.uTime.value = t;
  cometMat.uniforms.uTime.value = t;

  // gentle background drift
  starsGroup.rotation.y += starsGroup.userData.rotSpeed * dt * 10;

  // galaxy rotation — heart & Z are children, so they rotate together
  galaxyGroup.rotation.y += dt * 0.045;

  // heartbeat scale pulse (multiplied on top of intro-burst scale)
  const beat = heartBeatScale(t);
  if (experienceStarted){
    const introScale = heartGroup.scale.x; // current eased intro value
    if (introScale >= 0.98){
      heartGroup.scale.setScalar(beat);
    }
  }

  if (experienceStarted){
    updateBurst(now);
    updateShooters(dt);
    updateLoveHearts(t);
    updateComet(dt, now);
    updateSparks(dt);
  }

  controls.update();
  composer.render();
}
animate();
